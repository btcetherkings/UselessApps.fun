<!DOCTYPE html><html><head><title>Runaway Button</title></head><body style="margin:0;height:100vh;overflow:hidden;background:#ff9a9e;font-family:Comic Sans MS;"><button id="btn" style="position:absolute;padding:20px 40px;font-size:24px;background:#ff4757;color:white;border:none;border-radius:12px;cursor:pointer;">Click Me!</button><div id="msg" style="position:fixed;bottom:20px;background:white;padding:10px 20px;border-radius:30px;display:none;"></div><script>const btn=document.getElementById('btn');const msg=document.getElementById('msg');let count=0;btn.addEventListener('mouseover',()=>{btn.style.left=Math.random()*(window.innerWidth-btn.offsetWidth)+'px';btn.style.top=Math.random()*(window.innerHeight-btn.offsetHeight)+'px';});btn.addEventListener('click',()=>{count++;msg.style.display='block';msg.textContent=`Caught ${count} time(s)! Still useless. 😜`;setTimeout(()=>msg.style.display='none',2000);});</script></body></html>
