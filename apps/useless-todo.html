<!DOCTYPE html><html><head><title>Useless To-Do</title><style>body{font-family:'Comic Sans MS';text-align:center;padding:50px;background:#fab1a0;}ul{list-style:none;padding:0;}</style></head><body><h1>✅ Useless To‑Do List</h1><input type="text" id="task-input" placeholder="Type a task..."><button onclick="addTask()">Add Task</button><ul id="task-list"></ul><script>function addTask(){const input=document.getElementById('task-input');const task=input.value.trim();if(task){const li=document.createElement('li');li.textContent=task;document.getElementById('task-list').appendChild(li);setTimeout(()=>{li.remove();alert(`Task "${task}" has been deleted.`);},Math.random()*1500+500);input.value='';}}</script></body></html>
