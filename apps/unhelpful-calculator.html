<!DOCTYPE html><html><head><title>Unhelpful Calculator</title><style>body{font-family:monospace;text-align:center;padding:50px;background:#74b9ff;}.result{font-size:2rem;margin-top:20px;}</style></head><body><h1>🔢 Unhelpful Calculator</h1><input type="number" id="num1" placeholder="Number 1"><input type="number" id="num2" placeholder="Number 2"><button onclick="calculate()">Calculate</button><div class="result" id="result"></div><script>function calculate(){const a=parseFloat(document.getElementById('num1').value)||0;const b=parseFloat(document.getElementById('num2').value)||0;let answer;const r=Math.random();if(r<0.25)answer=a+b+7;else if(r<0.5)answer=a*b-13;else if(r<0.75)answer=Math.sqrt(a*a+b*b);else answer="🤷 "+(a+b)/0;document.getElementById('result').textContent=`The result is: ${answer}`;}</script></body></html>
