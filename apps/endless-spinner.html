<!DOCTYPE html><html><head><title>Loading...</title><style>body{background:#2d3436;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;}.spinner{width:100px;height:100px;border:16px solid #dfe6e9;border-top:16px solid #e17055;border-radius:50%;animation:spin 2s linear infinite;}@keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}.message{color:white;margin-left:20px;font-family:Arial;}</style></head><body><div class="spinner"></div><div class="message">Loading something... maybe forever. <button onclick="fakeProgress()" style="margin-left:20px;">Click to waste time</button></div><script>let progress=0;function fakeProgress(){const msg=document.querySelector('.message');progress+=Math.random()*5;if(progress>99)progress=99;msg.textContent=`Loading... ${Math.floor(progress)}% complete. Almost there!`;setTimeout(fakeProgress,1000);}</script></body></html>
