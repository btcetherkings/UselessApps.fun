<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UselessApps.fun – The home of apps that do nothing</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="confetti-container"></div>
    <header>
        <h1 id="main-title">UselessApps.fun</h1>
        <p class="tagline">The most pointless place on the internet. 🎉</p>
        <button id="submit-btn" class="big-button">Submit Your Useless App!</button>
    </header>
    <main>
        <section id="app-gallery">
            <h2>🧩 Useless App Gallery</h2>
            <div id="apps-container"></div>
        </section>
        <aside id="leaderboard">
            <h2>🏆 Uselessness Leaderboard</h2>
            <p><em>Real votes? Who cares. It's useless.</em></p>
            <ol id="leaderboard-list"></ol>
        </aside>
    </main>
    <footer>
        <p>Made with love and absolutely zero purpose. Contribute on <a href="https://github.com/btcetherkings/useless-apps-fun" target="_blank">GitHub</a>.</p>
    </footer>
    <div id="app-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <iframe id="app-iframe" src="" frameborder="0"></iframe>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
